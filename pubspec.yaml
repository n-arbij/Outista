name: outista
description: A personal outfit recommendation app based on wardrobe, weather, and calendar context.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^17.1.0

  # Local Database
  drift: ^2.31.0
  drift_flutter: ^0.2.8
  sqlite3_flutter_libs: ^0.5.41

  # Camera & Image
  camera: ^0.12.0
  image_cropper: ^11.0.0
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  path: ^1.9.0

  # Location & Weather
  geolocator: ^14.0.2
  http: ^1.2.0

  # Calendar
  device_calendar: ^4.3.1

  # UI & UX
  material_color_utilities: ^0.13.0
  cached_network_image: ^3.3.1
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0

  # Utilities
  uuid: ^4.3.3
  intl: ^0.20.2
  equatable: ^2.0.5
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.12.2
  drift_dev: ^2.31.0
  riverpod_generator: ^4.0.3
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  mockito: ^5.6.3
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-VariableFont_opsz,wght.ttf
        - asset: assets/fonts/Inter-Italic-VariableFont_opsz,wght.ttf
          style: italic
